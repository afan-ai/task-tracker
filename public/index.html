<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-nord">
  <div id="app">
    <header id="app-header">
      <h1 class="app-title">Task Tracker</h1>
      <div id="header-controls">
        <button id="profile-add" type="button" class="btn-icon" data-tooltip="Add Profile">+</button>
        <div id="profile-dropdown" class="dropdown">
          <button id="profile-dropdown-btn" class="dropdown-btn" type="button">Profile: Default</button>
          <div id="profile-dropdown-menu" class="dropdown-menu"></div>
        </div>
        <button id="privacy-btn" type="button" class="btn-icon" data-tooltip="Privacy Mode">&#x1F441;</button>
        <button id="settings-btn" type="button" class="btn-icon" data-tooltip="Settings">&#x2699;</button>
      </div>
    </header>
    <div id="app-body">
      <main id="calendar-panel">
        <header id="calendar-header"></header>
        <div id="calendar-grid"></div>
      </main>
      <aside id="sidebar">
        <header id="sidebar-header"></header>
        <div id="sidebar-content"></div>
        <footer id="sidebar-footer">
          <button id="import-export-btn" type="button">Import / Export</button>
        </footer>
      </aside>
    </div>
  </div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
